buildscript {
  ext.getExtOrDefault = { name ->
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties['RNKakaoLogin_' + name]
  }

  repositories {
    mavenCentral()
    google()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:${getExtOrDefault('gradleVersion')}"
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
  compileSdkVersion getExtOrDefault('compileSdkVersion').toInteger()

  defaultConfig {
    minSdkVersion getExtOrDefault('minSdkVersion').toInteger()
    targetSdkVersion getExtOrDefault('targetSdkVersion').toInteger()
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:${getExtOrDefault('kotlinVersion')}"

  // Kakao
  def kakaoVersion = getExtOrDefault('kakaoSdkVersion')
  implementation "com.kakao.sdk:v2-user:$kakaoVersion"
}

rootProject.allprojects {
  repositories {
    maven { url 'https://devrepo.kakao.com/nexus/content/groups/public/' }
  }
}
