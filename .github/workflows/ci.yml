name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  js:
    name: JS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build plugin
        run: npm run build:plugin

  android:
    name: Android
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Install example dependencies
        working-directory: example/RNKakaoSigninCliExample
        run: npm ci

      - name: Compile Kotlin
        working-directory: example/RNKakaoSigninCliExample/android
        run: ./gradlew :package-kr_react-native-kakao-signin:compileDebugKotlin

  ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      - name: Install example dependencies
        working-directory: example/RNKakaoSigninCliExample
        run: npm ci

      - name: Install pods
        working-directory: example/RNKakaoSigninCliExample/ios
        run: pod update React-Core-prebuilt ReactNativeDependencies hermes-engine --no-repo-update

      - name: Build iOS
        working-directory: example/RNKakaoSigninCliExample/ios
        run: xcodebuild -workspace RNKakaoSigninCliExample.xcworkspace -scheme RNKakaoSigninCliExample -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO
