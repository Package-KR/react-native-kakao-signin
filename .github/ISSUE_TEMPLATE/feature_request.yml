name: Feature request / 기능 요청
description: Request a new API, platform support, or behavior change. / 새 API, 플랫폼 지원, 동작 변경을 요청합니다.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / 문제
      description: What use case is not covered today? / 현재 어떤 사용 사례가 지원되지 않나요?
      placeholder: I need to... / ...가 필요합니다
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / 제안
      description: Describe the API or behavior you want. / 원하는 API 또는 동작을 설명해주세요.
      placeholder: Add a method that... / ...하는 메서드를 추가합니다
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 검토한 대안
      description: What workaround or other design did you consider? / 고려한 우회 방법이나 다른 설계가 있나요?
    validations:
      required: false
  - type: dropdown
    id: platforms
    attributes:
      label: Platform / 플랫폼
      multiple: true
      options:
        - iOS
        - Android
        - Expo
        - React Native CLI
        - TypeScript API
        - Documentation
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context / 추가 정보
      description: Add links to Kakao SDK docs, screenshots, logs, or examples if relevant. / 관련 Kakao SDK 문서 링크, 스크린샷, 로그, 예제가 있으면 추가해주세요.
    validations:
      required: false
